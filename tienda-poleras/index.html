<!DOCTYPE html>
<html lang="es-CL">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Poleras con diseños exclusivos y originales. Envíos a todo Chile. Calidad premium.">
    <meta property="og:title" content="Poleras by Diego - Diseños Exclusivos">
    <meta property="og:description" content="Descubre nuestra colección de poleras con arte original">
    <meta property="og:type" content="website">
    <title>Poleras by Diego | Diseños Exclusivos</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- HEADER -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <h1 class="logo">Poleras by Diego</h1>
                <div class="header-actions">
                    <div class="search-box">
                        <input type="text" id="searchInput" placeholder="Buscar diseños..." aria-label="Buscar productos">
                    </div>
                    <button class="cart-btn" id="cartBtn" aria-label="Abrir carrito">
                        🛒 <span class="cart-count" id="cartCount">0</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- HERO SECTION -->
    <section class="hero" id="hero">
        <div class="hero-content">
            <h2 class="hero-title">Diseños que hablan por ti</h2>
            <p class="hero-subtitle">Poleras premium con arte original</p>
            <button class="cta-btn" id="ctaBtn">Ver Diseños</button>
        </div>
    </section>

    <!-- FILTERS -->
    <section class="filters" id="filters">
        <div class="container">
            <div class="filters-grid">
                <div class="filter-group">
                    <label>Talla:</label>
                    <select id="filterTalla">
                        <option value="">Todas</option>
                        <option value="S">S</option>
                        <option value="M">M</option>
                        <option value="L">L</option>
                        <option value="XL">XL</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Color:</label>
                    <select id="filterColor">
                        <option value="">Todos</option>
                        <option value="Negro">Negro</option>
                        <option value="Blanco">Blanco</option>
                        <option value="Gris">Gris</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Precio máx:</label>
                    <input type="number" id="filterPrecio" placeholder="20000" min="0" step="1000">
                </div>
                <div class="filter-group">
                    <label>Estilo:</label>
                    <select id="filterTag">
                        <option value="">Todos</option>
                        <option value="animal">Animal</option>
                        <option value="urbano">Urbano</option>
                        <option value="humor">Humor</option>
                        <option value="arte">Arte</option>
                        <option value="tribal">Tribal</option>
                        <option value="psicodélico">Psicodélico</option>
                    </select>
                </div>
            </div>
        </div>
    </section>

    <!-- CATALOG -->
    <section class="catalog" id="catalog">
        <div class="container">
            <div class="catalog-grid" id="catalogGrid">
                <!-- Productos se cargan dinámicamente -->
            </div>
        </div>
    </section>

    <!-- PRODUCT MODAL -->
    <div class="modal" id="productModal">
        <div class="modal-content">
            <button class="modal-close" id="modalClose" aria-label="Cerrar">&times;</button>
            <div class="modal-body">
                <div class="modal-gallery">
                    <img id="modalImage" src="" alt="" loading="lazy">
                </div>
                <div class="modal-info">
                    <h2 id="modalTitle"></h2>
                    <p id="modalDescription"></p>
                    <div class="modal-tags" id="modalTags"></div>
                    <p class="modal-price" id="modalPrice"></p>

                    <div class="modal-selectors">
                        <div class="selector-group">
                            <label for="modalTalla">Talla:</label>
                            <select id="modalTalla">
                                <option value="S">S</option>
                                <option value="M">M</option>
                                <option value="L">L</option>
                                <option value="XL">XL</option>
                            </select>
                        </div>
                        <div class="selector-group">
                            <label for="modalColor">Color:</label>
                            <select id="modalColor">
                                <option value="Negro">Negro</option>
                                <option value="Blanco">Blanco</option>
                                <option value="Gris">Gris</option>
                            </select>
                        </div>
                        <div class="selector-group">
                            <label for="modalCantidad">Cantidad:</label>
                            <input type="number" id="modalCantidad" value="1" min="1" max="10">
                        </div>
                    </div>

                    <button class="add-to-cart-btn" id="addToCartBtn">Agregar al Carrito</button>
                </div>
            </div>
        </div>
    </div>

    <!-- CART DRAWER -->
    <div class="cart-drawer" id="cartDrawer">
        <div class="cart-header">
            <h3>Tu Carrito</h3>
            <button class="cart-close" id="cartClose" aria-label="Cerrar carrito">&times;</button>
        </div>
        <div class="cart-items" id="cartItems">
            <!-- Items se cargan dinámicamente -->
        </div>
        <div class="cart-footer">
            <div class="cart-summary">
                <div class="summary-row">
                    <span>Subtotal:</span>
                    <span id="cartSubtotal">$0</span>
                </div>
                <div class="summary-row">
                    <span>Envío estimado:</span>
                    <span id="cartShipping">$3.990</span>
                </div>
                <div class="summary-row total">
                    <span>Total:</span>
                    <span id="cartTotal">$0</span>
                </div>
            </div>
            <button class="checkout-btn" id="checkoutBtn">Ir a Checkout</button>
        </div>
    </div>

    <!-- CHECKOUT SECTION -->
    <section class="checkout hidden" id="checkoutSection">
        <div class="container">
            <h2>Finalizar Pedido</h2>
            <div class="checkout-grid">
                <div class="checkout-form">
                    <form id="checkoutForm">
                        <div class="form-group">
                            <label for="nombre">Nombre completo *</label>
                            <input type="text" id="nombre" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Email *</label>
                            <input type="email" id="email" required>
                        </div>
                        <div class="form-group">
                            <label for="telefono">Teléfono *</label>
                            <input type="tel" id="telefono" placeholder="+56912345678" required>
                        </div>
                        <div class="form-group">
                            <label for="direccion">Dirección *</label>
                            <input type="text" id="direccion" required>
                        </div>
                        <div class="form-group">
                            <label for="comuna">Comuna/Ciudad *</label>
                            <input type="text" id="comuna" required>
                        </div>
                        <div class="form-group">
                            <label for="envio">Método de envío *</label>
                            <select id="envio" required>
                                <option value="starken">Starken ($3.990)</option>
                                <option value="chilexpress">Chilexpress ($4.990)</option>
                                <option value="retiro">Retiro en punto acordado (Gratis)</option>
                            </select>
                        </div>
                        <button type="submit" class="submit-btn">Finalizar Pedido</button>
                    </form>
                </div>
                <div class="checkout-summary">
                    <h3>Resumen del Pedido</h3>
                    <div id="checkoutItems"></div>
                    <div class="checkout-totals">
                        <div class="summary-row">
                            <span>Subtotal:</span>
                            <span id="checkoutSubtotal">$0</span>
                        </div>
                        <div class="summary-row">
                            <span>Envío:</span>
                            <span id="checkoutShipping">$3.990</span>
                        </div>
                        <div class="summary-row total">
                            <span>Total:</span>
                            <span id="checkoutTotal">$0</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- OVERLAY -->
    <div class="overlay" id="overlay"></div>

    <script src="app.js"></script>
</body>
</html>
